<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scanner Retur V3 - Updated</title>
    <style>
        :root{--primary:#003399;--bg:#f8fafc;--shadow:0 4px 6px rgba(0,0,0,.08)}
        *{box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:var(--bg);max-width:520px;margin:auto;padding:10px;color:#334155}
        .header{background:var(--primary);color:#fff;padding:12px;border-radius:12px;text-align:center;margin-bottom:10px}
        .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
        #bca-indicator{width:70px;height:70px;border-radius:50%;background:#f33;margin:10px auto;transition:0.3s}
        #status-message{text-align:center;font-weight:bold;margin:8px 0}
        #reader{width:100%;border-radius:10px;overflow:hidden}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;background:#003399;color:#fff;font-weight:bold;cursor:pointer;display:none;} /* Disembunyikan karena auto-start */
        table{width:100%;border-collapse:collapse}
        th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
        .badge{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold;white-space:nowrap;}
        /* Warna Hijau untuk status "SUDAH KEMBALI" */
        .badge-kembali{background:#dcfce7;color:#166534}
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="header"><h3>🔄 SCANNER BARANG RETUR</h3></div>
<div id="bca-indicator"></div>
<div id="status-message">Menyalakan Kamera...</div>

<div class="card">
    <div id="reader"></div>
    <button id="startBtn" class="btn">Aktifkan Kamera</button>
</div>

<div class="card">
    <h3>Detail Scan</h3>
    <table>
        <tr><td>Resi</td><td id="d_resi">-</td></tr>
        <tr><td>Order ID</td><td id="d_order">-</td></tr>
        <tr><td>SKU</td><td id="d_sku">-</td></tr>
        <tr><td>Warna</td><td id="d_warna">-</td></tr>
        <tr><td>Size</td><td id="d_size">-</td></tr>
        <tr><td>Qty</td><td id="d_qty">-</td></tr>
        <tr><td>Ekspedisi</td><td id="d_exp">-</td></tr>
    </table>
</div>

<div class="card">
    <h3>Riwayat</h3>
    <table>
        <thead><tr><th>Resi</th><th>Status</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<script>
    // MASUKKAN URL DEPLOYMENT GOOGLE APPS SCRIPT ANDA DI SINI
    const APP_URL = "https://script.google.com/macros/s/AKfycbyuJTOZaFhOZ52fFKPCxFIulD5rTFJb6VehsELtOZgjmaJf0Epc4Jm71gcPVLtE9sJK/exec";
    
    let html5QrCode = null;
    let scanHistory = JSON.parse(localStorage.getItem("returHistory") || "[]");

    // Otomatis jalankan kamera saat halaman dimuat
    window.onload = function() {
        renderHistory();
        startCamera();
    };

    function setLampu(warna, pesan) {
        const bg = warna === "ijo" ? "#00cc44" : warna === "kuning" ? "#ffcc00" : "#ff3333";
        document.getElementById("bca-indicator").style.backgroundColor = bg;
        document.getElementById("status-message").innerText = pesan;
    }

    function updateDetail(data) {
        document.getElementById("d_resi").innerText = data.resi || "-";
        document.getElementById("d_order").innerText = data.orderId || "-";
        document.getElementById("d_sku").innerText = data.sku || "-";
        document.getElementById("d_warna").innerText = data.warna || "-";
        document.getElementById("d_size").innerText = data.size || "-";
        document.getElementById("d_qty").innerText = data.qty || "-";
        document.getElementById("d_exp").innerText = data.ekspedisi || "-";
    }

    function startCamera() {
        if(html5QrCode) return;
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:220}, (decodedText) => {
            html5QrCode.pause(true);
            prosesScan(decodedText.trim());
        }).then(() => setLampu("ijo", "Siap Scan!"));
    }

    async function prosesScan(resi) {
        setLampu("kuning", "Memproses...");
        try {
            const r = await fetch(APP_URL, {
                method: "POST",
                body: JSON.stringify({ resi: resi, source: "scanRetur" })
            });
            const json = await r.json();

            if(json.status === "success") {
                updateDetail(json);
                // INI PERUBAHANNYA: Status di layar jadi "Sudah Kembali"
                setLampu("ijo", "Sudah Kembali"); 
                // INI PERUBAHANNYA: Status di riwayat jadi "SUDAH KEMBALI"
                saveHistory(resi, "SUDAH KEMBALI", "badge-kembali");
            } else if(json.status === "duplicate") {
                // Tampilan untuk resi yang sebelumnya sudah pernah di-scan
                setLampu("merah", "Sudah Pernah Scan");
                // Di riwayat tetap tampilkan "SUDAH KEMBALI" (karena memang sudah kembali)
                saveHistory(resi, "SUDAH KEMBALI", "badge-kembali");
            } else if(json.status === "notfound") {
                setLampu("merah", "Resi Tidak Ditemukan");
                // Jangan simpan ke riwayat jika tidak ditemukan
            }
        } catch(err) {
            setLampu("merah", "Error Koneksi ke Server");
        }
        // Jeda 2 detik sebelum bisa men-scan resi berikutnya
        setTimeout(() => { if(html5QrCode) html5QrCode.resume(); }, 2000);
    }

    function saveHistory(resi, status, badgeClass) {
        // Cek apakah resi sudah ada di riwayat lokal, jika ada hapus dulu
        scanHistory = scanHistory.filter(item => item.resi !== resi);
        
        // Tambahkan scan terbaru ke paling atas
        scanHistory.unshift({ resi, status, badge: badgeClass });
        
        // Batasi hanya menyimpan 15 riwayat terakhir
        scanHistory = scanHistory.slice(0, 15);
        localStorage.setItem("returHistory", JSON.stringify(scanHistory));
        renderHistory();
    }

    function renderHistory() {
        document.getElementById("historyBody").innerHTML = scanHistory.map(item => `
            <tr><td>${item.resi}</td><td><span class="badge ${item.badge}">${item.status}</span></td></tr>
        `).join("");
    }
</script>

</body>
</html>
