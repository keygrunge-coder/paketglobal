<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scanner Retur V3</title>
<style>
:root{--primary:#003399;--bg:#f8fafc;--shadow:0 4px 6px rgba(0,0,0,.08)}
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{background:var(--bg);max-width:520px;margin:auto;padding:10px;color:#334155}
.header{background:var(--primary);color:#fff;padding:12px;border-radius:12px;text-align:center;margin-bottom:10px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
#bca-indicator{width:70px;height:70px;border-radius:50%;background:#f33;margin:10px auto}
#status-message{text-align:center;font-weight:bold;margin:8px 0}
#reader{width:100%;border-radius:10px;overflow:hidden}
.btn{width:100%;padding:14px;border:none;border-radius:10px;background:#003399;color:#fff;font-weight:bold}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
.badge{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold}
.badge-kembali{background:#dcfce7;color:#166534}
.badge-sudah{background:#fee2e2;color:#b91c1c}
.badge-tidak{background:#fef3c7;color:#92400e}
</style>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
<div class="header"><h3>🔄 SCANNER BARANG RETUR</h3></div>
<div id="bca-indicator"></div>
<div id="status-message">Menyalakan Kamera...</div>
<div class="card">
<div id="reader"></div>
<button id="startBtn" class="btn">Aktifkan Kamera</button>
</div>

<div class="card">
<h3>Detail Scan</h3>
<table>
<tr><td>Resi</td><td id="d_resi">-</td></tr>
<tr><td>Order ID</td><td id="d_order">-</td></tr>
<tr><td>SKU</td><td id="d_sku">-</td></tr>
<tr><td>Warna</td><td id="d_warna">-</td></tr>
<tr><td>Size</td><td id="d_size">-</td></tr>
<tr><td>Qty</td><td id="d_qty">-</td></tr>
<tr><td>Ekspedisi</td><td id="d_exp">-</td></tr>
</table>
</div>

<div class="card">
<h3>Riwayat</h3>
<table><thead><tr><th>Resi</th><th>Status</th></tr></thead><tbody id="historyBody"></tbody></table>
</div>

<script>
// Tempelkan JavaScript milik scanner kamu di sini.
// APP_URL tetap seperti project kamu.
// File ini sudah disiapkan untuk menerima response:
// success, duplicate, notfound,
// beserta field:
// resi, orderId, sku, warna, size, qty, ekspedisi.
</script>
</body>
</html>
