<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Retur SPX</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.box{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

input,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

#hasil{
    margin-top:20px;
    white-space:pre-wrap;
    font-family:monospace;
}
</style>

</head>
<body>

<div class="box">

<h2>UPLOAD RETUR SPX</h2>

<input
type="file"
id="file"
accept=".xlsx,.xls">

<button onclick="upload()">
Upload ke RETUR_SPX
</button>

<div id="hasil">
Belum ada file.
</div>

</div>

<script>

const APP_URL =
"https://script.google.com/macros/s/AKfycbyuJTOZaFhOZ52fFKPCxFIulD5rTFJb6VehsELtOZgjmaJf0Epc4Jm71gcPVLtE9sJK/exec";

async function upload(){

    const hasil = document.getElementById("hasil");

    const file =
    document.getElementById("file").files[0];

    if(!file){
        alert("Pilih file Excel dulu.");
        return;
    }

    hasil.textContent="Membaca file...";

    const reader = new FileReader();

    reader.onload = async function(e){

        try{

            const workbook =
            XLSX.read(
                new Uint8Array(e.target.result),
                {type:"array"}
            );

            const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

            const rows =
            XLSX.utils.sheet_to_json(
                sheet,
                {
                    header:1,
                    defval:""
                }
            );

            hasil.textContent="Mengupload...";

            const response = await fetch(APP_URL,{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    source:"uploadReturSPX",
                    rows:rows
                })
            });

            const json =
            await response.json();

            hasil.textContent =
            JSON.stringify(json,null,2);

        }catch(err){

            hasil.textContent =
            err.toString();

            console.error(err);

        }

    };

    reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
