<style>

:root{
--primary:#003399;
--bg-body:#f8fafc;
--card-shadow:0 4px 6px -1px rgb(0 0 0 / 0.05);
--keluar-bg:#dcfce7;
--keluar-text:#166534;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg-body);
padding:10px;
color:#334155;
max-width:500px;
margin:0 auto;
}

.header-box{
background:var(--primary);
color:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
text-align:center;
}

.card{
background:white;
border-radius:14px;
padding:14px;
margin-bottom:12px;
box-shadow:var(--card-shadow);
border:1px solid #f1f5f9;
}

.card h3{
font-size:14px;
font-weight:700;
margin-bottom:10px;
color:#475569;
text-transform:uppercase;
}

#bca-indicator{
width:70px;
height:70px;
border-radius:50%;
background:#ff3333;
margin:10px auto;
box-shadow:0 0 12px rgba(0,0,0,.2);
transition:.3s;
}

#status-message{
font-size:15px;
font-weight:bold;
margin:10px 0;
color:#334155;
text-align:center;
}

#reader{
width:100%;
border-radius:10px;
overflow:hidden;
background:black;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:700;
cursor:pointer;
background:var(--primary);
color:white;
}

.history-container{
max-height:250px;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px 6px;
font-size:13px;
text-align:left;
}

th{
background:#f8fafc;
color:#64748b;
font-weight:700;
position:sticky;
top:0;
}

td{
border-bottom:1px solid #f1f5f9;
}

.badge{
padding:3px 8px;
border-radius:6px;
font-size:11px;
font-weight:700;
display:inline-block;
}

.badge-kembali{
background:#dcfce7;
color:#166534;
}

.badge-sudah{
background:#fee2e2;
color:#b91c1c;
}

.badge-tidak{
background:#fef3c7;
color:#92400e;
}

.badge-error{
background:#e5e7eb;
color:#374151;
}

</style>

<div class="header-box">
<h3>🔄 SCANNER BARANG RETUR</h3>
</div>

<div id="bca-indicator"></div>
<div id="status-message">Menyalakan Kamera...</div>

<div class="card">
<div id="reader"></div>

<button id="startBtn" class="btn" style="margin-top:10px">
Aktifkan Kamera
</button>
</div>

<div class="card">
<h3>Riwayat Retur</h3>

<div class="history-container">
<table>
<thead>
<tr>
<th>Resi</th>
<th>Status</th>
</tr>
</thead>

<tbody id="historyBody"></tbody>
</table>
</div>
</div>

<script>

window.onload=function(){

startCamera();

if(typeof muatDataDashboardAwal==="function"){
muatDataDashboardAwal();
}

};

const APP_URL="https://script.google.com/macros/s/AKfycbyuJTOZaFhOZ52fFKPCxFIulD5rTFJb6VehsELtOZgjmaJf0Epc4Jm71gcPVLtE9sJK/exec";

let html5QrCode=null;

let scanHistory=
JSON.parse(
localStorage.getItem("returHistory")||"[]"
);

renderHistory();

function robotBicara(teks){

if("speechSynthesis" in window){

window.speechSynthesis.cancel();

const tts=
new SpeechSynthesisUtterance(teks);

tts.lang="id-ID";
tts.rate=1.2;

window.speechSynthesis.speak(tts);

}

}

function setLampu(warna,pesan){

document.getElementById("bca-indicator").style.backgroundColor=
warna==="ijo"
? "#00cc44"
: warna==="kuning"
? "#ffcc00"
: "#ff3333";

document.getElementById("status-message").innerText=pesan;

}

function startCamera(){

if(html5QrCode) return;

html5QrCode=
new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:220},
(decodedText)=>{

html5QrCode.pause(true);

prosesScan(
decodedText.trim()
);

}
)
.then(()=>{

setLampu(
"ijo",
"Siap Scan Returan!"
);

robotBicara(
"Sistem Retur Siap"
);

});

}

document.getElementById("startBtn")
.onclick=startCamera;

async function prosesScan(resi){

setLampu(
"kuning",
"Memproses..."
);

try{

const r=
await fetch(APP_URL,{
method:"POST",
body:JSON.stringify({
resi:resi,
source:"retur"
})
});

const json=
await r.json();

let statusClass="badge-error";
let statusText="ERROR";

if(json.status==="success"){

setLampu(
"ijo",
"Barang Sudah Kembali"
);

robotBicara(
"Barang Sudah Kembali"
);

statusClass="badge-kembali";
statusText="KEMBALI";

}

else if(json.status==="duplicate"){

setLampu(
"merah",
"Sudah Pernah Scan"
);

robotBicara(
"Sudah Pernah Diproses"
);

statusClass="badge-sudah";
statusText="SUDAH";

}

else if(json.status==="notfound"){

setLampu(
"merah",
"Resi Tidak Ditemukan"
);

robotBicara(
"Resi Tidak Ditemukan"
);

statusClass="badge-tidak";
statusText="TIDAK ADA";

}

scanHistory.unshift({
resi:resi,
status:statusText,
badge:statusClass
});

localStorage.setItem(
"returHistory",
JSON.stringify(
scanHistory.slice(0,15)
)
);

renderHistory();

}
catch(err){

setLampu(
"merah",
"Error Koneksi"
);

robotBicara(
"Gagal Koneksi"
);

}

setTimeout(()=>{

if(html5QrCode){
html5QrCode.resume();
}

},1500);

}

function renderHistory(){

const body=
document.getElementById(
"historyBody"
);

body.innerHTML=
scanHistory.map(item=>`
<tr>
<td>${item.resi}</td>
<td>
<span class="badge ${item.badge}">
${item.status}
</span>
</td>
</tr>
`).join("");

}

</script>
