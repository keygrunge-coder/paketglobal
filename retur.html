<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Scanner Retur</title>

<style>

/* CSS LANGSUNG DI DALAM FILE HTML */

:root{
--primary:#003399;
--bg-body:#f8fafc;
--card-shadow:0 4px 6px -1px rgb(0 0 0 / 0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg-body);
padding:10px;
color:#334155;
max-width:500px;
margin:auto;
}

.header-box{
background:var(--primary);
color:#fff;
padding:12px;
border-radius:12px;
margin-bottom:10px;
text-align:center;
}

.card{
background:#fff;
border-radius:14px;
padding:14px;
margin-bottom:12px;
box-shadow:var(--card-shadow);
}

#bca-indicator{
width:70px;
height:70px;
border-radius:50%;
background:#ff3333;
margin:10px auto;
}

#status-message{
text-align:center;
font-weight:bold;
margin:10px 0;
}

#reader{
width:100%;
overflow:hidden;
border-radius:10px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#003399;
color:white;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:11px;
font-weight:bold;
}

.badge-kembali{
background:#dcfce7;
color:#166534;
}

.badge-sudah{
background:#fee2e2;
color:#b91c1c;
}

.badge-tidak{
background:#fef3c7;
color:#92400e;
}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="header-box">
<h3>🔄 SCANNER BARANG RETUR</h3>
</div>

<div id="bca-indicator"></div>

<div id="status-message">
Menyalakan Kamera...
</div>

<div class="card">

<div id="reader"></div>

<button id="startBtn" class="btn">
Aktifkan Kamera
</button>

</div>

<div class="card">

<h3>Riwayat Retur</h3>

<table>

<thead>
<tr>
<th>Resi</th>
<th>Status</th>
</tr>
</thead>

<tbody id="historyBody"></tbody>

</table>

</div>

<script>

const APP_URL="https://script.google.com/macros/s/AKfycbyuJTOZaFhOZ52fFKPCxFIulD5rTFJb6VehsELtOZgjmaJf0Epc4Jm71gcPVLtE9sJK/exec";

let html5QrCode=null;

let scanHistory=
JSON.parse(
localStorage.getItem("returHistory")||"[]"
);

window.onload=function(){
renderHistory();
startCamera();
};

function robotBicara(teks){

if('speechSynthesis' in window){

speechSynthesis.cancel();

const tts=
new SpeechSynthesisUtterance(teks);

tts.lang='id-ID';

speechSynthesis.speak(tts);

}

}

function setLampu(warna,pesan){

document.getElementById("bca-indicator")
.style.backgroundColor=
warna==="ijo"
? "#00cc44"
: warna==="kuning"
? "#ffcc00"
: "#ff3333";

document.getElementById("status-message")
.innerText=pesan;

}

function startCamera(){

if(html5QrCode) return;

html5QrCode=
new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:220},
(decodedText)=>{

html5QrCode.pause(true);

prosesScan(
decodedText.trim()
);

}
)
.then(()=>{

setLampu(
"ijo",
"Siap Scan Returan!"
);

robotBicara(
"Sistem Retur Siap"
);

});

}

document
.getElementById("startBtn")
.onclick=startCamera;

async function prosesScan(resi){

setLampu(
"kuning",
"Memproses..."
);

try{

const r=
await fetch(APP_URL,{
method:"POST",
body:JSON.stringify({
resi:resi,
source:"scanRetur"
})
});

const json=
await r.json();

let badge="badge-tidak";
let status="ERROR";

if(json.status==="success"){

badge="badge-kembali";
status="KEMBALI";

setLampu(
"ijo",
"Barang Sudah Kembali"
);

robotBicara(
"Barang Sudah Kembali"
);

}
else if(json.status==="duplicate"){

badge="badge-sudah";
status="SUDAH";

setLampu(
"merah",
"Sudah Pernah Scan"
);

robotBicara(
"Sudah Pernah Diproses"
);

}

scanHistory.unshift({
resi,
status,
badge
});

localStorage.setItem(
"returHistory",
JSON.stringify(
scanHistory.slice(0,15)
)
);

renderHistory();

}
catch(err){

setLampu(
"merah",
"Error Koneksi"
);

}

setTimeout(()=>{

if(html5QrCode){
html5QrCode.resume();
}

},1500);

}

function renderHistory(){

document.getElementById(
"historyBody"
).innerHTML=

scanHistory.map(item=>`

<tr>
<td>${item.resi}</td>
<td>
<span class="badge ${item.badge}">
${item.status}
</span>
</td>
</tr>

`).join("");

}

</script>

</body>
</html>
